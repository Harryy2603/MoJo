services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=your_mongodb_atlas_url_here
      - JWT_SECRET=random#secret
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      - ml-service

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000
    ports:
      - "5173:80"
    depends_on:
      - backend

  ml-service:
    build: ./ml-service
    ports:
      - "8000:8000"